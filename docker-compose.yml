##############################################################################
# docker-compose.yml — Production RAG stack v5 (size-optimised + monitoring)
#
# TWO IMAGES:
#   api image     (Dockerfile)        ~1.0–1.2 GB  — no torch/sentence-transformers
#   worker image  (Dockerfile.worker) ~2.0–2.3 GB  — full ML stack
#
# SERVICES:
#   qdrant, postgres, redis           — storage layer
#   api, celery_worker, celery_beat   — application layer
#   flower                            — Celery monitoring   :5555
#   prometheus                        — metrics scraper     :9090
#   grafana                           — dashboards          :3001
#
##############################################################################

services:

  # ── Qdrant ───────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.13.0
    container_name: qdrant
    ports:
      - "127.0.0.1:6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - rag_network
    restart: unless-stopped
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: "2.0"
    # No healthcheck — qdrant image has no curl/wget by default.
    # Confirmed working via: curl http://localhost:6333/healthz
    # Dependents use condition: service_started (intentional).

  # ── PostgreSQL ───────────────────────────────────────────
  postgres:
    image: postgres:16.3-alpine
    container_name: ragdb
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ragdb
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    command: >
      postgres
      -c shared_buffers=256MB
      -c work_mem=16MB
      -c max_connections=200
      -c wal_buffers=16MB
      -c checkpoint_completion_target=0.9
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - rag_network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1.0"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ragdb"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ── Redis ────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: redis
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save 60 1
      --appendonly yes
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - rag_network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 768m
          cpus: "0.5"
    healthcheck:
      # [R4] --no-auth-warning prevents the password from appearing
      # in the ps aux process list on the host.
      test: ["CMD-SHELL", "redis-cli --no-auth-warning -a ${REDIS_PASSWORD} ping | grep PONG"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  # ── FastAPI — slim image (no torch) ──────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rag_api
    command: >
      gunicorn main:app
      --workers ${GUNICORN_WORKERS:-4}
      --worker-class uvicorn.workers.UvicornWorker
      --bind 0.0.0.0:8000
      --timeout 120
      --graceful-timeout 30
    ports:
      # [R3] Bind to 127.0.0.1 — consistent with all other services.
      # Place a reverse proxy (nginx/traefik) in front for public access.
      - "127.0.0.1:8000:8000"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    networks:
      - rag_network
    restart: unless-stopped
    volumes:
      - pdf_uploads:/app/pdfs    # shared with celery_worker — API writes, worker reads
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: "2.0"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Celery worker — heavy image (torch + sentence-transformers) ──
  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: rag_celery_worker    # [R6] explicit name for docker logs/exec/stats
    command: >
      celery -A tasks worker
      --loglevel=info
      --concurrency=${CELERY_WORKER_CONCURRENCY:-2}
      --queues=celery
      --hostname=worker@%h
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    networks:
      - rag_network
    restart: unless-stopped
    volumes:
      - pdf_uploads:/app/pdfs
    deploy:
      resources:
        limits:
          memory: 6g
          cpus: "4.0"
    healthcheck:
      test: ["CMD-SHELL", "celery -A tasks inspect ping -d worker@$$HOSTNAME --timeout 5 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── Celery Beat ───────────────────────────────────────────
  celery_beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rag_celery_beat
    command: >
      celery -A tasks beat
      --loglevel=info
      --scheduler celery.beat.PersistentScheduler
      --schedule /var/spool/celerybeat/celerybeat-schedule
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - rag_network
    restart: unless-stopped
    # [R1] Persistent volume — schedule file survives container restarts.
    # Previously /tmp was used which is wiped on every restart, causing
    # beat to re-fire all periodic tasks immediately on each boot.
    volumes:
      - celery_beat_data:/var/spool/celerybeat
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.25"

  # ── Flower ────────────────────────────────────────────────
  flower:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rag_flower
    command: >
      celery -A tasks flower
      --port=5555
      --basic_auth=${FLOWER_USER:-admin}:${FLOWER_PASSWORD:-flowerpass}
    ports:
      - "127.0.0.1:5555:5555"
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - rag_network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.25"

  # ── Prometheus ────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: rag_prometheus
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
    networks:
      - rag_network
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy   # wait until API is actually up
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"

  # ── Grafana ───────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.0
    container_name: rag_grafana
    ports:
      - "127.0.0.1:3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      # [R5] No fallback default — fails loudly if GRAFANA_PASSWORD not set
      # in .env rather than silently using 'admin' as the password.
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - rag_network
    restart: unless-stopped
    # [R7] loki condition upgraded to service_healthy — loki has a
    # healthcheck defined, using service_started was ignoring it.
    depends_on:
      prometheus:
        condition: service_started
      loki:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.25"

  # ── Loki — log aggregation ────────────────────────────────
  # Stores and indexes logs from all containers.
  # Grafana queries Loki to display logs alongside metrics.
  loki:
    image: grafana/loki:2.9.0
    container_name: rag_loki
    ports:
      - "127.0.0.1:3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - loki_data:/loki
    networks:
      - rag_network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3100/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # ── Promtail — log shipper ────────────────────────────────
  # Scrapes Docker container logs and ships them to Loki.
  # Automatically labels logs by container name, service, etc.
  #
  # [R8] Gated behind profile: linux-monitoring.
  # /var/lib/docker/containers and /var/run/docker.sock are Linux-only
  # paths that do not exist on Windows Docker Desktop. The profile makes
  # promtail opt-in so Windows users can run the full stack without it.
  #
  # Start with monitoring on Linux:
  #   docker compose --profile linux-monitoring up
  # Start without monitoring (Windows or Linux):
  #   docker compose up
  promtail:
    image: grafana/promtail:2.9.0
    container_name: rag_promtail
    profiles: ["linux-monitoring"]    # [R8] Linux-only — opt-in
    volumes:
      - ./promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock
    command: -config.file=/etc/promtail/config.yml
    networks:
      - rag_network
    restart: unless-stopped
    depends_on:
      loki:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: "0.25"

# ── Volumes ───────────────────────────────────────────────
volumes:
  qdrant_data:
  pg_data:
  redis_data:
  pdf_uploads:
  prometheus_data:
  grafana_data:
  loki_data:
  celery_beat_data:    # [R1] persistent celery beat schedule storage

# ── Network ───────────────────────────────────────────────
networks:
  rag_network:
    driver: bridge